        <div class="contactcontainer">
            <h1>Lets Get In Touch!</h1>
            <h2>Contact me for work, photo usage, travel or camera tips, or for any inquiries!</h2>
            <p>Fields marked with an asterisk * are required.</p>
            <br>

            <form action="https://webdevbasics.net/scripts/pacific.php" method="post">

                <label for="FirstName">*First Name:</label>
                <input type="text" id="FirstName" name="FirstName" placeholder="'John'" required>

                <label for="LastName">*Last Name:</label>
                <input type="text" id="LastName" name="LastName" placeholder="'Smith'" required>

                <label for="Phone#">Phone Number:</label>
                <input type="tel" id="Phone#" name="Phone#" maxlength="12" placeholder="xxx-xxx-xxxx">

                <label for="Email">*E-mail Address</label>
                <input type="email" name="Email" id="Email" placeholder="johnsmith@email.com" required>

                <label for="Subject">*Subject</label>
                <input type="text" name="Subject" id="Subject" placeholder="Subject" required>

                <label for="myComments">*Comments</label>
                <textarea name="myComments" id="myComments" rows="2" cols="30" required></textarea>

                <input type="submit" value="submit">
            </form>
        </div>
    </main>
